# CI matrix — Phase 3 slice 0 (docs/phase3-readiness.md §6).
#
# Two jobs, both required green:
#   linux   — ubuntu-latest runner, steps inside a debian:trixie container. The
#             container pins the userland to the SAME distro as the WSL2 inner loop
#             on 7of9 (and the CD-gate VM, if one is ever needed) — a matched Trixie
#             triple, immune to ubuntu-latest version drift. This job is what
#             catches a Windows-ism leaking into core/ the moment it appears.
#   windows — windows-latest + MSYS2 UCRT64 (the dev toolchain). Full build + the
#             whole ctest suite (xfade_handoff_test self-SKIPs via SKIP_RETURN_CODE
#             77 when the runner has no audio device — by design).
#
# Since slice 1 the Linux job builds the FULL `remoct` binary (the portable core
# compiles, links, and plays a local file — the slice-1 gate) plus the test
# suite. The remaining if(WIN32) tests join the Linux side as their seam impls
# land (slices 2-6).
name: CI

on:
  push:
    branches: [restructure, main, experimental/win-pdcurses]
  pull_request:
    branches: [restructure, main, experimental/win-pdcurses]

jobs:
  linux:
    name: Linux (Debian Trixie container)
    runs-on: ubuntu-latest
    container: debian:trixie
    steps:
      - name: Install toolchain + deps
        run: |
          # fdk-aac lives in non-free — enable the extra components (the same
          # one-line change the WSL2 inner loop needed; readiness doc §4).
          sed -i 's/^Components: main.*/Components: main contrib non-free non-free-firmware/' /etc/apt/sources.list.d/*.sources
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential g++ cmake ninja-build pkg-config git ca-certificates \
            libflac-dev libmp3lame-dev libebur128-dev libfdk-aac-dev \
            libopus-dev libopusfile-dev libwavpack-dev \
            libncurses-dev libtag-dev libcurl4-openssl-dev libnotify-dev \
            libasound2-dev libpulse-dev
      - uses: actions/checkout@v4
      # Fail-fast, before any compile: the prefixed-include convention for
      # codec headers is machine-enforced here (the CMake -I ordering that
      # also protects it is defense-in-depth only). vorbisfile is included
      # forward-looking for the Vorbis slice.
      - name: Include-guard lint (bare codec headers)
        run: |
          # Forbid bare <opusfile.h>/<vorbisfile.h>: must be <opus/...> / <vorbis/...>.
          # TagLib ships taglib/opusfile.h + taglib/vorbisfile.h on the same include path;
          # a bare include silently resolves to the C++ tag class instead of the C codec API.
          if grep -rnE '#[[:space:]]*include[[:space:]]*<(opusfile|vorbisfile)\.h>' src/ include/; then
            echo "ERROR: bare <opusfile.h>/<vorbisfile.h> include - use the codec prefix." >&2
            exit 1
          fi
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build (remoct + test suite)
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  windows:
    name: Windows (MSYS2 UCRT64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Set up MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          release: false
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-ncurses
            mingw-w64-ucrt-x86_64-taglib
            mingw-w64-ucrt-x86_64-flac
            mingw-w64-ucrt-x86_64-lame
            mingw-w64-ucrt-x86_64-libebur128
            mingw-w64-ucrt-x86_64-fdk-aac
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-opusfile
            mingw-w64-ucrt-x86_64-wavpack
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      # ── Option C single-exe package: assert the dependency allowlist ──
      # Build the static wingui package (re-moct.exe + remoct_stream.dll) and
      # confirm the ONLY non-system DLLs across BOTH are exactly libfdk-aac-2.dll
      # + libebur128.dll (the two documented, deliberately-dynamic codecs). A
      # third non-system DLL sneaking back in (e.g. libstdc++ / libgcc_s) fails
      # the build - the Phase-5 graduation gate, mechanised.
      - name: Option C dependents check (2-DLL allowlist)
        run: |
          set -e
          cmake -S . -B build-oc -G Ninja -DCMAKE_BUILD_TYPE=Release \
                -DREMOCT_PDCURSES=ON -DREMOCT_STATIC_PROBE=ON
          cmake --build build-oc
          deps=$( { ldd build-oc/bin/remoct.exe; \
                    ldd build-oc/bin/plugins/remoct_stream.dll; } \
                  | grep '=>' | grep -iv '/windows/' | awk '{print $1}' | sort -u )
          echo "Non-system DLL dependencies (exe + plugin):"
          echo "$deps"
          fail=0
          for d in $deps; do
            case "$d" in
              libfdk-aac-2.dll|libebur128.dll) ;;
              *) echo "::error::disallowed non-system DLL: $d"; fail=1 ;;
            esac
          done
          if [ "$fail" != "0" ]; then
            echo "Option C dependents check FAILED"; exit 1
          fi
          echo "Option C dependents check PASSED — only libfdk-aac-2.dll + libebur128.dll"
